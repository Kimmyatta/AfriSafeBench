services:
  - type: web
    name: afrisafebench-api
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://afrisafebench-ai-safety.vercel.app,http://127.0.0.1:5173,http://localhost:5173
